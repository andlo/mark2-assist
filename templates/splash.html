<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, height=480">
  <title>Mark II Assist — Starting</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width: 800px; height: 480px;
      background: #050510;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e8e8f0;
      cursor: none;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(96,128,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(96,128,255,0.035) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .face-wrap {
      width: 130px; height: 130px; margin-bottom: 22px;
      opacity: 0; transform: scale(0.92);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .face-wrap.visible { opacity: 1; transform: scale(1); }
    .title {
      font-size: 2.1rem; font-weight: 200; letter-spacing: 0.08em;
      color: #e8e8f0; opacity: 0; transform: translateY(8px);
      transition: opacity 0.5s ease 0.3s, transform 0.5s ease 0.3s;
    }
    .title.visible { opacity: 1; transform: translateY(0); }
    .title .accent { color: #6080ff; font-weight: 400; }
    .tagline {
      font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: #50507a; margin-top: 7px;
      opacity: 0; transition: opacity 0.5s ease 0.5s;
    }
    .tagline.visible { opacity: 1; }
    .logos {
      display: flex; align-items: center; gap: 16px; margin-top: 26px;
      opacity: 0; transition: opacity 0.5s ease 0.7s;
    }
    .logos.visible { opacity: 0.55; }
    .logo-pill {
      display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px; padding: 5px 13px;
    }
    .logo-dot { width: 7px; height: 7px; border-radius: 50%; }
    .logo-text { font-size: 0.7rem; color: #8888aa; letter-spacing: 0.06em; }
    .sep { width: 1px; height: 18px; background: rgba(255,255,255,0.08); }
    .progress-area {
      margin-top: 34px; width: 260px;
      opacity: 0; transition: opacity 0.4s ease 0.9s;
    }
    .progress-area.visible { opacity: 1; }
    .progress-label {
      font-size: 0.62rem; color: #303055; letter-spacing: 0.14em;
      text-transform: uppercase; text-align: center; margin-bottom: 9px;
    }
    .progress-track {
      width: 100%; height: 2px;
      background: rgba(255,255,255,0.05);
      border-radius: 1px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: #6080ff; border-radius: 1px; width: 0%;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .hostname {
      position: absolute; bottom: 16px; right: 20px;
      font-size: 0.6rem; color: #1a1a30; letter-spacing: 0.1em;
    }
    .ready-flash {
      position: absolute; inset: 0;
      background: rgba(96,128,255,0.06);
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .ready-flash.active { opacity: 1; }
  </style>
</head>
<body>
<div class="stage">
  <div class="face-wrap" id="face-wrap">
    <svg viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg">
      <circle cx="65" cy="65" r="60" fill="none" stroke="rgba(96,128,255,0.10)" stroke-width="1"/>
      <circle cx="65" cy="65" r="54" fill="none" stroke="rgba(96,128,255,0.05)" stroke-width="1"/>
      <ellipse cx="43" cy="58" rx="14" ry="14" fill="#e8e8f0"/>
      <ellipse cx="87" cy="58" rx="14" ry="14" fill="#e8e8f0"/>
      <circle id="p-l" cx="43" cy="59" r="6.5" fill="#050510"/>
      <circle id="p-r" cx="87" cy="59" r="6.5" fill="#050510"/>
      <circle cx="45.5" cy="55.5" r="2.2" fill="rgba(255,255,255,0.65)"/>
      <circle cx="89.5" cy="55.5" r="2.2" fill="rgba(255,255,255,0.65)"/>
      <rect id="lid-l" x="29" y="44" width="28" height="28" fill="#050510"/>
      <rect id="lid-r" x="73" y="44" width="28" height="28" fill="#050510"/>
      <path id="mouth" d="M 50 86 Q 65 90 80 86"
            fill="none" stroke="#e8e8f0" stroke-width="2.5" stroke-linecap="round"/>
      <circle id="blush-l" cx="30" cy="74" r="8" fill="rgba(255,100,140,0)"/>
      <circle id="blush-r" cx="100" cy="74" r="8" fill="rgba(255,100,140,0)"/>
      <circle id="td1" cx="53" cy="100" r="3" fill="rgba(96,128,255,0)"/>
      <circle id="td2" cx="65" cy="100" r="3" fill="rgba(96,128,255,0)"/>
      <circle id="td3" cx="77" cy="100" r="3" fill="rgba(96,128,255,0)"/>
    </svg>
  </div>

  <div class="title" id="title">Mark II <span class="accent">Assist</span></div>
  <div class="tagline" id="tagline">Home Assistant Voice Satellite</div>

  <div class="logos" id="logos">
    <div class="logo-pill">
      <div class="logo-dot" style="background:#18bcf2;"></div>
      <span class="logo-text">Home Assistant</span>
    </div>
    <div class="sep"></div>
    <div class="logo-pill">
      <div class="logo-dot" style="background:#6080ff;"></div>
      <span class="logo-text">Linux Voice Assistant</span>
    </div>
    <div class="sep"></div>
    <div class="logo-pill">
      <div class="logo-dot" style="background:#9060c0;"></div>
      <span class="logo-text">Mycroft Mark II</span>
    </div>
  </div>

  <div class="progress-area" id="progress-area">
    <div class="progress-label" id="status-text">Starting</div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill"></div>
    </div>
  </div>
</div>

<div class="hostname" id="hostname">%%HOSTNAME%%</div>
<div class="ready-flash" id="ready-flash"></div>

<script>
  const lidL=document.getElementById('lid-l'), lidR=document.getElementById('lid-r');
  const pL=document.getElementById('p-l'), pR=document.getElementById('p-r');
  const blL=document.getElementById('blush-l'), blR=document.getElementById('blush-r');
  const mouth=document.getElementById('mouth');
  const prog=document.getElementById('prog-fill');
  const label=document.getElementById('status-text');
  const flash=document.getElementById('ready-flash');
  const td1=document.getElementById('td1'), td2=document.getElementById('td2'), td3=document.getElementById('td3');

  const STEPS=[
    [8,  'Initialising hardware',       'idle'],
    [22, 'Starting audio (PipeWire)',    'idle'],
    [40, 'Voice assistant starting',    'wake'],
    [58, 'Connecting to Home Assistant','connecting'],
    [76, 'Loading dashboard',           'think'],
    [92, 'Almost ready\u2026',          'think'],
    [100,'Ready',                        'speak'],
  ];

  let lidH=28;
  function openEyes(cb) {
    if (lidH<=0){cb&&cb();return;}
    lidH=Math.max(0,lidH-1.4);
    const y=44+(28-lidH)/2;
    lidL.setAttribute('y',y); lidL.setAttribute('height',lidH);
    lidR.setAttribute('y',y); lidR.setAttribute('height',lidH);
    const b=(1-lidH/28)*0.16;
    blL.setAttribute('fill',`rgba(255,100,140,${b})`);
    blR.setAttribute('fill',`rgba(255,100,140,${b})`);
    requestAnimationFrame(()=>openEyes(cb));
  }
  function blink(){
    lidL.setAttribute('height',24); lidL.setAttribute('y',46);
    lidR.setAttribute('height',24); lidR.setAttribute('y',46);
    setTimeout(()=>{lidL.setAttribute('height',0);lidR.setAttribute('height',0);},110);
    setTimeout(blink,2800+Math.random()*4000);
  }
  function wander(){
    const ox=(Math.random()-0.5)*6, oy=(Math.random()-0.5)*3;
    pL.setAttribute('cx',43+ox); pL.setAttribute('cy',59+oy);
    pR.setAttribute('cx',87+ox); pR.setAttribute('cy',59+oy);
    setTimeout(wander,700+Math.random()*1300);
  }
  let dotAnim=null;
  function startDots(){
    let i=0;
    dotAnim=setInterval(()=>{
      td1.setAttribute('fill',i===0?'rgba(96,128,255,0.9)':'rgba(96,128,255,0.2)');
      td2.setAttribute('fill',i===1?'rgba(96,128,255,0.9)':'rgba(96,128,255,0.2)');
      td3.setAttribute('fill',i===2?'rgba(96,128,255,0.9)':'rgba(96,128,255,0.2)');
      i=(i+1)%3;
    },300);
  }
  function stopDots(){
    if(dotAnim){clearInterval(dotAnim);dotAnim=null;}
    td1.setAttribute('fill','rgba(96,128,255,0)');
    td2.setAttribute('fill','rgba(96,128,255,0)');
    td3.setAttribute('fill','rgba(96,128,255,0)');
  }
  function setFaceState(s){
    stopDots();
    if(s==='wake'){
      mouth.setAttribute('d','M 50 86 Q 65 94 80 86');
      blL.setAttribute('fill','rgba(255,100,140,0.22)');
      blR.setAttribute('fill','rgba(255,100,140,0.22)');
    } else if(s==='connecting'){
      startDots();
    } else if(s==='think'){
      mouth.setAttribute('d','M 52 86 Q 65 83 78 86');
    } else if(s==='speak'){
      mouth.setAttribute('d','M 48 85 Q 65 97 82 85');
      blL.setAttribute('fill','rgba(255,100,140,0.28)');
      blR.setAttribute('fill','rgba(255,100,140,0.28)');
    }
  }

  let stepIdx=0;
  function nextStep(){
    if(stepIdx>=STEPS.length) return;
    const [pct,lbl,face]=STEPS[stepIdx++];
    prog.style.width=pct+'%';
    label.textContent=lbl;
    setFaceState(face);
    if(pct===100){
      setTimeout(()=>{
        flash.classList.add('active');
        setTimeout(()=>flash.classList.remove('active'),400);
      },600);
      return;
    }
    const delay=face==='connecting'?2200:(500+Math.random()*500);
    setTimeout(nextStep,delay);
  }

  setTimeout(()=>document.getElementById('face-wrap').classList.add('visible'),100);
  setTimeout(()=>openEyes(()=>{wander();setTimeout(blink,1200);}),400);
  setTimeout(()=>document.getElementById('title').classList.add('visible'),800);
  setTimeout(()=>document.getElementById('tagline').classList.add('visible'),1000);
  setTimeout(()=>document.getElementById('logos').classList.add('visible'),1200);
  setTimeout(()=>document.getElementById('progress-area').classList.add('visible'),1400);
  setTimeout(nextStep,1600);

  // Navigate to ?next= when HA is reachable (poll /ha/ proxy which returns 200/401/302)
  // We poll the HA proxy endpoint so we know HA actually responds, not just that
  // combined.html exists on disk (it always does immediately).
  const params=new URLSearchParams(window.location.search);
  const nextUrl=params.get('next');
  const haProxy=params.get('ha') || 'http://localhost:8088/ha/';
  if(nextUrl){
    function pollReady(){
      // First check HA via GET (httpd proxies it — HEAD not reliable)
      fetch(haProxy,{method:'GET',cache:'no-store',signal:AbortSignal.timeout(3000)})
        .then(r=>{
          if(r.status===200||r.status===401||r.status===302){
            // HA is up — navigate to combined.html
            window.location.replace(nextUrl);
          } else { setTimeout(pollReady,1000); }
        })
        .catch(()=>setTimeout(pollReady,1000));
    }
    // Start polling after face opens (3s)
    setTimeout(pollReady,3000);
  }
</script>
</body>
</html>
