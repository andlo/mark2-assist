# PipeWire virtual source: SJ201 ASR (XVF-3510 capture channel)
#
# Creates a named PipeWire audio source that reads directly from the SJ201
# ALSA hardware capture device (hw:CARD=sj201,DEV=1).
#
# The XMOS XVF-3510 capture device delivers:
#   - 48kHz stereo at the hardware level (ALSA plughw:sj201,1)
#   - PipeWire resamples to 16kHz mono for openWakeWord / LVA
#
# NOTE: "VF_ASR_(L)" is NOT a valid ALSA hw path — it is an ALSA software
# PCM alias defined in ~/.asoundrc. PipeWire's api.alsa.pcm.source bypasses
# .asoundrc and needs a real hardware path (hw: or plughw:).
# Using hw:CARD=sj201,DEV=1 lets PipeWire own the device directly.
#
# Install to: ~/.config/pipewire/pipewire.conf.d/sj201-asr.conf
# Reload:     systemctl --user restart pipewire pipewire-pulse wireplumber

context.objects = [
  {
    factory = adapter
    args = {
      factory.name     = api.alsa.pcm.source
      node.name        = sj201-asr
      node.description = "SJ201 ASR (VF_ASR_L)"
      media.class      = Audio/Source
      api.alsa.path    = "hw:CARD=sj201,DEV=1"
      audio.rate       = 16000
      audio.channels   = 1
      audio.position   = [MONO]
    }
  }
]
