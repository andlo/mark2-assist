# pipewire-sj201-asr.conf — Expose SJ201 microphone as PulseAudio source
# via PipeWire's module-alsa-source, bypassing WirePlumber ACP.
#
# WHY NOT WirePlumber pro-audio:
# WirePlumber resets the XVF3510 DSP pipeline when it opens hw:sj201,1
# via the ACP (Audio Card Profile) pro-audio profile. This produces 0-signal
# regardless of when xvf3510-flash runs. The fix is to expose the capture
# device directly via pipewire-pulse without going through WirePlumber ACP.
#
# This creates "ALSA Source on hw:sj201,1" as a PulseAudio/PipeWire source.
# LVA uses: --audio-input-device 'ALSA Source on hw:sj201,1'
pulse.cmd = [
  {
    cmd = load-module
    args = "module-alsa-source device=hw:sj201,1 rate=48000 channels=2 format=s32le"
    flags = []
  }
]
