# PipeWire virtual sink for SJ201 speaker output
#
# Creates a named PipeWire audio sink that writes to ALSA plughw:CARD=sj201,DEV=0
# — the Pi I2S output to XMOS XVF-3510 → TAS5806 amplifier → speaker.
#
# WHY THIS IS NEEDED:
# Pi's I2S bus is half-duplex at the driver level. When LVA holds the mic
# capture device open (via soundcard/PipeWire), direct ALSA playback to
# plughw:sj201,DEV=0 causes a kernel crash (system reboot).
#
# PipeWire's virtual sink solves this by owning the ALSA device itself and
# multiplexing through its internal graph — mic capture and speaker output
# coexist without conflicting at the ALSA level.
#
# Additionally, python-mpv's end-file callback never fires when using the
# generic 'pipewire' or 'pulse' audio devices on aarch64/Python 3.13.
# Using 'pipewire/sj201-output' (this named sink) gives reliable callbacks.
#
# Install to: ~/.config/pipewire/pipewire.conf.d/sj201-output.conf
# Reload:     systemctl --user restart pipewire pipewire-pulse wireplumber
# LVA usage:  --audio-output-device 'pipewire/sj201-output'

context.objects = [
  {
    factory = adapter
    args = {
      factory.name     = api.alsa.pcm.sink
      node.name        = sj201-output
      node.description = "SJ201 Speaker"
      media.class      = Audio/Sink
      api.alsa.path    = "plughw:CARD=sj201,DEV=0"
      audio.rate       = 48000
      audio.channels   = 2
      audio.position   = [FL FR]
    }
  }
]
