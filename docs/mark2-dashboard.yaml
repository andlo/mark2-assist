# =============================================================================
# Mark II Dashboard — 800×480 touch optimised
#
# Requirements (install via HACS):
#   - Mushroom Cards    https://github.com/piitaya/lovelace-mushroom
#   - layout-card       https://github.com/thomasloven/lovelace-layout-card
#   - card-mod          https://github.com/thomasloven/lovelace-card-mod
#   - Kiosk Mode        https://github.com/NemesisRE/kiosk-mode
#                       NOTE: use kiosk_mode: in YAML (NemesisRE fork),
#                       NOT kiosk: (that was the old bramkl/kiosk-mode plugin)
#
# Setup: see docs/HA_SETUP.md
#
# Replace these placeholder entity IDs with your own:
#   weather.forecast_home   — your weather entity
#   light.your_light        — main light in the room
#   media_player.mark2      — Mark II media player (MPD / Music Assistant)
#   climate.your_room       — thermostat in the room
#   person.your_name        — primary person entity
#   scene.good_night        — good night scene (or remove the card)
#   scene.good_morning      — good morning scene (or remove the card)
#   input_boolean.mark2_dnd — do not disturb toggle (create as Helper or remove)
# =============================================================================

title: Mark II
kiosk_mode:
  user_settings:
    - users:
        - mark2           # mark2 username (display name also works)
      hide_header: true
      hide_sidebar: true
views:
  - title: Home
    path: mark2
    panel: false
    subview: false
    type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr 1fr 1fr
      grid-template-rows: auto auto auto auto
      gap: 8px
      padding: 8px
    badges: []
    cards:

      # -----------------------------------------------------------------------
      # ROW 1: Clock + Weather
      # -----------------------------------------------------------------------

      - type: custom:mushroom-template-card
        primary: "{{ now().strftime('%H:%M') }}"
        secondary: "{{ now().strftime('%A, %-d %B') }}"
        icon: mdi:clock-outline
        icon_color: blue
        tap_action:
          action: none
        card_mod:
          style: |
            ha-card { font-size: 1.4em; }
            .primary { font-size: 2.2em !important; font-weight: 200 !important; }
            .secondary { font-size: 1em !important; color: var(--secondary-text-color); }
        layout_options:
          grid_columns: 2
          grid_rows: 1

      - type: custom:mushroom-weather-card
        entity: weather.forecast_home
        show_humidity: true
        show_wind_speed: true
        show_wind_bearing: false
        show_visibility: false
        show_precipitation: false
        secondary_info: precipitation
        layout_options:
          grid_columns: 2
          grid_rows: 1

      # -----------------------------------------------------------------------
      # ROW 2: Media Player (full width)
      # Tip: replace media_player.mark2 with your MPD or Music Assistant entity
      # -----------------------------------------------------------------------

      - type: custom:mushroom-media-player-card
        entity: media_player.mark2
        use_media_info: true
        use_media_artwork: true
        show_volume_level: true
        volume_controls:
          - volume_mute
          - volume_set
          - volume_buttons
        media_controls:
          - previous
          - play_pause_stop
          - next
        collapsible_controls: false
        layout_options:
          grid_columns: 4
          grid_rows: 1

      # -----------------------------------------------------------------------
      # ROW 3: Light + Climate + Scenes
      # -----------------------------------------------------------------------

      - type: custom:mushroom-light-card
        entity: light.your_light
        show_brightness_control: true
        show_color_temp_control: false
        show_color_control: false
        use_light_color: true
        layout_options:
          grid_columns: 1
          grid_rows: 1

      - type: custom:mushroom-climate-card
        entity: climate.your_room
        show_temperature_control: true
        hvac_modes:
          - heat
          - 'off'
        layout_options:
          grid_columns: 1
          grid_rows: 1

      - type: custom:mushroom-template-card
        primary: Good Night
        icon: mdi:weather-night
        icon_color: indigo
        tap_action:
          action: perform-action
          perform_action: scene.turn_on
          target:
            entity_id: scene.good_night
        layout_options:
          grid_columns: 1
          grid_rows: 1

      - type: custom:mushroom-template-card
        primary: Good Morning
        icon: mdi:weather-sunny
        icon_color: orange
        tap_action:
          action: perform-action
          perform_action: scene.turn_on
          target:
            entity_id: scene.good_morning
        layout_options:
          grid_columns: 1
          grid_rows: 1

      # -----------------------------------------------------------------------
      # ROW 4: Presence + Timer + Do Not Disturb
      # Tip: add more person cards or replace with other entities
      # -----------------------------------------------------------------------

      - type: custom:mushroom-person-card
        entity: person.your_name
        use_entity_picture: true
        tap_action:
          action: none
        layout_options:
          grid_columns: 1
          grid_rows: 1

      # Tip: add a second person card here, or replace with another entity
      # - type: custom:mushroom-person-card
      #   entity: person.your_partner
      #   use_entity_picture: true
      #   layout_options:
      #     grid_columns: 1
      #     grid_rows: 1

      - type: custom:mushroom-template-card
        primary: >
          {% set timers = states.timer | selectattr('state', 'eq', 'active') | list %}
          {% if timers %}{{ timers[0].attributes.friendly_name }}
          {% else %}No timer{% endif %}
        secondary: >
          {% set timers = states.timer | selectattr('state', 'eq', 'active') | list %}
          {% if timers %}{{ timers[0].attributes.remaining }}{% endif %}
        icon: mdi:timer-outline
        icon_color: >
          {% set timers = states.timer | selectattr('state', 'eq', 'active') | list %}
          {% if timers %}amber{% else %}disabled{% endif %}
        tap_action:
          action: none
        layout_options:
          grid_columns: 1
          grid_rows: 1

      - type: custom:mushroom-template-card
        primary: >
          {% if is_state('input_boolean.mark2_dnd', 'on') %}Muted
          {% else %}Listening{% endif %}
        icon: >
          {% if is_state('input_boolean.mark2_dnd', 'on') %}mdi:microphone-off
          {% else %}mdi:microphone{% endif %}
        icon_color: >
          {% if is_state('input_boolean.mark2_dnd', 'on') %}red
          {% else %}green{% endif %}
        tap_action:
          action: toggle
          entity: input_boolean.mark2_dnd
        layout_options:
          grid_columns: 1
          grid_rows: 1
