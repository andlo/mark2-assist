# PipeWire virtual source: SJ201 ASR (VF_ASR_L)
#
# Creates a named PipeWire audio source that reads from ALSA's VF_ASR_(L) device,
# which is defined in ~/.asoundrc by the VocalFusionDriver.
#
# VF_ASR_(L) is the XMOS XVF-3510's left channel ASR output with:
#   - 16kHz sample rate
#   - Mono (left channel only — dedicated ASR output)
#   - Proper gain and resampling via XMOS DSP
#
# Without this, PipeWire only sees the raw plughw:sj201,DEV=1 at 48kHz stereo
# with RMS~17-20 (too low for openWakeWord). VF_ASR_(L) gives RMS~500+.
#
# Install to: ~/.config/pipewire/pipewire.conf.d/sj201-asr.conf
# Reload:     systemctl --user restart pipewire pipewire-pulse wireplumber

context.objects = [
  {
    factory = adapter
    args = {
      factory.name     = api.alsa.pcm.source
      node.name        = sj201-asr
      node.description = "SJ201 ASR (VF_ASR_L)"
      media.class      = Audio/Source
      api.alsa.path    = "VF_ASR_(L)"
      audio.rate       = 16000
      audio.channels   = 1
      audio.position   = [MONO]
    }
  }
]
